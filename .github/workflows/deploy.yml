name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Setup Node (para lint/build check del admin) ─────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Instalar dependencias admin
        working-directory: admin
        run: npm ci

      - name: Build Next.js (verificación)
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      # ── 3. Deploy SSH al servidor ────────────────────────────
      - name: Deploy al servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /opt/chatbot

            echo "── Pull de GitHub ──"
            git pull origin main

            echo "── Rebuild y restart ──"
            docker compose up --build -d 2>&1 | tail -25

            echo "── Estado final ──"
            docker compose ps --format 'table {{.Name}}\t{{.Status}}'
