services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chatbot}
      POSTGRES_DB: chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chatbot -d chatbot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Migrate (manual profile; run only when needed) ─────────────────────────
  migrate:
    build:
      context: .
      target: migrate
    profiles:
      - migrations
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://chatbot:chatbot@postgres:5432/chatbot}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API backend ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://chatbot:chatbot@postgres:5432/chatbot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    ports:
      - "${API_HOST_PORT:-3200}:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── WA send worker (consumes queue:wa_send) ───────────────────────────────
  wa-worker:
    build:
      context: .
    restart: unless-stopped
    command: ["node", "src/workers/waSendWorker.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://chatbot:chatbot@postgres:5432/chatbot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Admin panel (Next.js) ────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
