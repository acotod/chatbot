services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chatbot -d chatbot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Migrate (runs once then exits) ─────────────────────────────────────────
  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot@postgres:5432/chatbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── API backend ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot@postgres:5432/chatbot
      REDIS_URL: redis://redis:6379
      JWT_SECRET: "${JWT_SECRET:-dev-local-jwt-secret-change-this-1234567890}"
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "${PORT:-3200}:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Note: migrate dependency temporarily disabled due to pre-existing DB migration issue
      # migrate:
      #   condition: service_completed_successfully

  # ── Admin panel (Next.js) ────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3200}"
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
